networks:
  mawf-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mawf}
      POSTGRES_USER: ${POSTGRES_USER:-mawf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - mawf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mawf} -d ${POSTGRES_DB:-mawf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # NO ports: binding — internal only

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - mawf-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # NO ports: binding — internal only

  # ── SME Agents (stateless, port 8080 internal) ─────────────────────────────

  sme-data:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sme-api:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: api
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sme-ux:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: ux
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sme-business:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: business
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sme-networking:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: networking
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  sme-devops:
    build:
      context: .
      dockerfile: services/sme/Dockerfile
    environment:
      SME_DOMAIN: devops
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Core Agent Services ─────────────────────────────────────────────────────

  coder:
    build:
      context: .
      dockerfile: services/coder/Dockerfile
    ports:
      - "8001:8001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
    volumes:
      - ./artifacts:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  reviewer:
    build:
      context: .
      dockerfile: services/reviewer/Dockerfile
    ports:
      - "8002:8002"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
    volumes:
      - ./artifacts:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  qa:
    build:
      context: .
      dockerfile: services/qa/Dockerfile
    ports:
      - "8003:8003"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
    volumes:
      - ./artifacts:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
      CODER_URL: http://coder:8001
      REVIEWER_URL: http://reviewer:8002
      QA_URL: http://qa:8003
      SME_DATA_URL: http://sme-data:8080
      SME_API_URL: http://sme-api:8080
      SME_UX_URL: http://sme-ux:8080
      SME_BUSINESS_URL: http://sme-business:8080
      SME_NETWORKING_URL: http://sme-networking:8080
      SME_DEVOPS_URL: http://sme-devops:8080
    volumes:
      - ./artifacts:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      coder:
        condition: service_healthy
      reviewer:
        condition: service_healthy
      qa:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Observability App ───────────────────────────────────────────────────────

  obs-app:
    build:
      context: ./obs-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ORCHESTRATOR_URL: ${NEXT_PUBLIC_ORCHESTRATOR_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      # Internal URL used by Next.js server-side routes (SSE proxy, data fetching)
      # Must reach orchestrator on the Docker network — never the host-side port
      ORCHESTRATOR_INTERNAL_URL: http://orchestrator:8000
    networks:
      - mawf-net
    restart: unless-stopped
    depends_on:
      - orchestrator
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
