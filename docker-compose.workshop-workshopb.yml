# Auto-generated by scripts/new_workshop.sh for workshop: workshopb
# Offset: 10
# Ports: orchestrator=8010, coder=8011,
#        reviewer=8012, qa=8013, obs-app=3001
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.workshop-workshopb.yml up -d

# Workshop-specific network (isolated from other workshops)
networks:
  mawf-net-workshopb:
    driver: bridge

# Workshop-specific volumes
volumes:
  artifacts-workshopb:
  pg-data-workshopb:
  redis-data-workshopb:

services:
  postgres-workshopb:
    extends:
      file: docker-compose.yml
      service: postgres
    volumes:
      - pg-data-workshopb:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - mawf-net-workshopb
    # No ports: binding

  redis-workshopb:
    extends:
      file: docker-compose.yml
      service: redis
    volumes:
      - redis-data-workshopb:/data
    networks:
      - mawf-net-workshopb
    # No ports: binding

  # ── Inlined (no extends): port-publishing services ─────────────────────────
  # See NOTE at top of scripts/new_workshop.sh — extends + ports merge bug.

  coder-workshopb:
    build:
      context: .
      dockerfile: services/coder/Dockerfile
    ports:
      - "8011:8001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-workshopb:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres-workshopb:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
    volumes:
      - artifacts-workshopb:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net-workshopb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres-workshopb:
        condition: service_healthy
      redis-workshopb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  reviewer-workshopb:
    build:
      context: .
      dockerfile: services/reviewer/Dockerfile
    ports:
      - "8012:8002"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-workshopb:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres-workshopb:5432/${POSTGRES_DB:-mawf}
      ARTIFACT_PATH: /artifacts
      INPUT_PATH: /input
    volumes:
      - artifacts-workshopb:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net-workshopb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres-workshopb:
        condition: service_healthy
      redis-workshopb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  qa-workshopb:
    build:
      context: .
      dockerfile: services/qa/Dockerfile
    ports:
      - "8013:8003"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
