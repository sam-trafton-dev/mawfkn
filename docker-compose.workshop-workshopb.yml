# Auto-generated by scripts/new_workshop.sh for workshop: workshopb
# Offset: 10
# Ports: orchestrator=8010, coder=8011,
#        reviewer=8012, qa=8013, obs-app=3001
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.workshop-workshopb.yml up -d

# Workshop-specific network (isolated from other workshops)
networks:
  mawf-net-workshopb:
    driver: bridge

# Workshop-specific volumes
volumes:
  artifacts-workshopb:
  pg-data-workshopb:
  redis-data-workshopb:

services:
  postgres-workshopb:
    extends:
      file: docker-compose.yml
      service: postgres
    volumes:
      - pg-data-workshopb:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - mawf-net-workshopb
    # No ports: binding

  redis-workshopb:
    extends:
      file: docker-compose.yml
      service: redis
    volumes:
      - redis-data-workshopb:/data
    networks:
      - mawf-net-workshopb
    # No ports: binding

  orchestrator-workshopb:
    extends:
      file: docker-compose.yml
      service: orchestrator
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mawf}:${POSTGRES_PASSWORD}@postgres-workshopb:5432/${POSTGRES_DB:-mawf}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-workshopb:6379/0
      CODER_URL: http://coder-workshopb:8001
      REVIEWER_URL: http://reviewer-workshopb:8002
      QA_URL: http://qa-workshopb:8003
      SME_DATA_URL: http://sme-data-workshopb:8080
      SME_API_URL: http://sme-api-workshopb:8080
      SME_UX_URL: http://sme-ux-workshopb:8080
      SME_BUSINESS_URL: http://sme-business-workshopb:8080
      SME_NETWORKING_URL: http://sme-networking-workshopb:8080
      SME_DEVOPS_URL: http://sme-devops-workshopb:8080
    volumes:
      - artifacts-workshopb:/artifacts
    networks:
      - mawf-net-workshopb
    depends_on:
      postgres-workshopb:
        condition: service_healthy
      redis-workshopb:
        condition: service_healthy
      coder-workshopb:
        condition: service_healthy
      reviewer-workshopb:
        condition: service_healthy
      qa-workshopb:
        condition: service_healthy

  coder-workshopb:
