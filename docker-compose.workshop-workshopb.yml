    depends_on:
      postgres-workshopb:
        condition: service_healthy
      redis-workshopb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 15s
