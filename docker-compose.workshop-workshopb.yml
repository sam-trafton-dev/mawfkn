      SME_DEVOPS_URL: http://sme-devops-workshopb:8080
    volumes:
      - artifacts-workshopb:/artifacts
      - ./input:/input:ro
    networks:
      - mawf-net-workshopb
    restart: unless-stopped
    deploy:
