        condition: service_healthy
      coder-workshopb:
        condition: service_healthy
      reviewer-workshopb:
        condition: service_healthy
      qa-workshopb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
